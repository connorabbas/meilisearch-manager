services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.dev
        container_name: meilisearch-manager
        entrypoint: /bin/sh
        working_dir: /workspace
        volumes:
            - '.:/workspace'
        tty: true
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.meilisearch-manager.rule=Host(`meilisearch-manager.localhost`)'
            - 'traefik.http.services.meilisearch-manager.loadbalancer.server.port=${VITE_APP_PORT:-5173}'
        networks:
            - web
            - proxy

    meilisearch:
        image: 'getmeili/meilisearch:latest'
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
        environment:
            MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-true}'
            MEILI_MASTER_KEY: '${MEILISEARCH_MASTER_KEY:-masterKey}'
            MEILI_ENV: development
        volumes:
            - 'meilisearch-data:/meili_data'
        networks:
            - web
        healthcheck:
            test:
                - CMD
                - wget
                - '--no-verbose'
                - '--spider'
                - 'http://127.0.0.1:7700/health'
            retries: 3
            timeout: 5s
    meilisearch-ui: # for testing
        container_name: demostore-meilisearch-ui
        image: riccoxie/meilisearch-ui:latest
        restart: unless-stopped
        ports:
            - ${MEILISEARCH_UI_PORT:-24900}:24900
        depends_on:
            - meilisearch
        networks:
            - web
            - proxy
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.meilisearch-ui.rule=Host(`meilisearch-ui.localhost`)'
            - 'traefik.http.services.meilisearch-ui.loadbalancer.server.port=${MEILISEARCH_UI_PORT:-24900}'

volumes:
    meilisearch-data:

networks:
    web:
        driver: bridge
    proxy:
        # setup in separate container
        name: 'traefik_proxy'
        external: true
